name: Docs

# Build the VitePress site in docs/ and publish it to GitHub Pages.
# Triggers: a push to main that touches the docs (or this workflow), and a
# manual run. Pull requests build but do not deploy, so a fork PR can't publish.

on:
  push:
    branches: [main]
    paths:
      - docs/**
      - .github/workflows/docs.yml
  pull_request:
    paths:
      - docs/**
      - .github/workflows/docs.yml
  workflow_dispatch:

# Least privilege by default; the deploy job elevates only what Pages needs.
permissions:
  contents: read

# One deploy at a time. Don't cancel a running publish; let it finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: docs

      - name: Build with VitePress
        run: npm run build
        working-directory: docs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    # Only publish from the canonical branch, never from a pull request.
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
