; Fetcharr default comskip.ini, tuned for Australian free-to-air DVB-T.
; Based on Marc Kean's Australian digital TV settings.
; Override by placing your own comskip.ini in the /config bind mount.
detect_method=255
max_commercialbreak=600
min_commercialbreak=25
max_commercial_size=125
min_commercial_size=4
max_brightness=60
test_brightness=40
max_avg_brightness=25
min_silence=12
max_volume=500
logo_percentile=0.92
logo_threshold=0.75
output_edl=1
